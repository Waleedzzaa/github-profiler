<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Scraper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <header>
            <svg height="32" aria-hidden="true" viewBox="0 0 16 16" version="1.1" width="32" data-view-component="true" class="octicon">
                <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
            </svg>
            <h2>GitHub Scraper</h2>
        </header>
        
        <div class="search-box">
            <input type="text" id="user" placeholder="Enter a GitHub Username" autocomplete="off">
            <button onclick="run()">Scrape Profile</button>
        </div>
        
        <div class="results-container" id="out-container">
            <div id="out" class="placeholder-text">Results will appear here...</div>
        </div>
    </main>

    <script>
        async function run() {
            const name = document.getElementById('user').value.trim();
            const out = document.getElementById('out');
            
            if (!name) {
                out.innerHTML = "<div class='placeholder-text' style='color:#ff7b72'>Please enter a username.</div>";
                return;
            }

            out.innerHTML = "<div class='placeholder-text'>Loading...</div>";
            
            try {
                const res = await fetch(`http://localhost:3000/scrape?username=${name}`);
                const data = await res.json();
                
                if (data.error) {
                    out.innerHTML = `<div class='placeholder-text' style='color:#ff7b72'>Error: ${data.error}</div>`;
                    return;
                }
                
                let html = `
                    <div class="profile-header">
                        <h3>${data.name || name}</h3>
                        ${data.bio ? `<p class="bio">${data.bio}</p>` : ''}
                        <div class="stats">
                            <span class="stat-badge">📦 ${data.repositories} Repositories</span>
                            <span class="stat-badge">⭐ ${data.stars} Stars</span>
                            <span class="stat-badge">🔥 ${data.contributions.replace(' contributions in the last year', '')}</span>
                        </div>
                    </div>
                `;

                if (data.topRepositories && data.topRepositories.length > 0) {
                    html += `<h4 class="section-title">Top Repositories</h4><div class="repo-grid">`;
                    data.topRepositories.forEach(repo => {
                        html += `
                            <div class="repo-card">
                                <h5>${repo.name}</h5>
                                <p class="repo-desc">${repo.description || 'No description available'}</p>
                                <p class="repo-lang"><span class="lang-dot"></span> ${repo.languages}</p>
                            </div>
                        `;
                    });
                    html += `</div>`;
                } else {
                    html += `<div class="placeholder-text">No top repositories found.</div>`;
                }

                out.innerHTML = html;
            } catch (err) {
                out.innerHTML = `<div class='placeholder-text' style='color:#ff7b72'>Error: ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
